<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>두신이엔지 공수분석</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background-color: #f4f4f4; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #1e293b; color: white; }
        .logo { display: block; margin: 0 auto 10px; width: 100px; }
    </style>
</head>
<body>
    <h2 style="text-align:center;">현장 공수 현황</h2>
    <div id="table-container">데이터를 불러오는 중...</div>

    <script>
        Papa.parse('data.csv', {
            download: true,
            header: true,
            encoding: "EUC-KR", // 사장님, 여기가 핵심입니다! 한글 안 깨지게 잡아주는 설정이에요.
            complete: function(results) {
                let data = results.data;
                let html = '<table><thead><tr>';
                Object.keys(data[0]).forEach(key => { html += `<th>${key}</th>`; });
                html += '</tr></thead><tbody>';
                data.forEach(row => {
                    if(row[Object.keys(row)[0]]) {
                        html += '<tr>';
                        Object.values(row).forEach(val => { html += `<td>${val}</td>`; });
                        html += '</tr>';
                    }
                });
                html += '</tbody></table>';
                document.getElementById('table-container').innerHTML = html;
            },
            error: function() {
                document.getElementById('table-container').innerHTML = "파일을 읽을 수 없습니다. data.csv 확인 요망";
            }
        });
    </script>
</body>
</html>
