<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로젝트 정밀 분석 시스템 V3.9.8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #334155; }
        .dashboard-card { background: white; border-radius: 1.25rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; overflow: hidden; }
        .matrix-table th, .matrix-table td { border: 1px solid #e2e8f0; min-width:90px; text-align: center; padding: 12px 8px; }
        .matrix-table th { background-color: #f8fafc; font-weight: 900; color: #1e293b; position: sticky; top: 0; z-index: 10; }
        .cell-highlight { background-color: #fffbeb; }
        select { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 0.75rem center; background-size: 1rem; }
    </style>
</head>
<body class="pb-20">

    <nav class="bg-slate-900 text-white py-4 px-6 sticky top-0 z-50 shadow-2xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-amber-500 p-2 rounded-xl text-slate-900 font-black text-sm">PRO-V3.9.8</div>
                <h1 class="text-xl font-black tracking-tight">(주)두신이엔지 공정 분석기</h1>
            </div>
            <div id="avgHintContainer" class="hidden bg-amber-500/10 border border-amber-500/30 px-4 py-2 rounded-xl">
                <span class="text-amber-500 text-sm font-black italic" id="avgHintText"></span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 mt-8 space-y-6">
        <section class="dashboard-card p-6 border-t-4 border-t-amber-500 bg-slate-50">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase">연도</label>
                    <select id="selYear" onchange="updateProjectList()" class="w-full h-12 px-3 bg-white border-2 border-slate-200 rounded-xl text-lg font-black"></select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase">월</label>
                    <select id="selMonth" onchange="updateProjectList()" class="w-full h-12 px-3 bg-white border-2 border-slate-200 rounded-xl text-lg font-black">
                        <option value="">전체 월</option>
                        <option value="1">1월</option><option value="2">2월</option><option value="3">3월</option><option value="4">4월</option>
                        <option value="5">5월</option><option value="6">6월</option><option value="7">7월</option><option value="8">8월</option>
                        <option value="9">9월</option><option value="10">10월</option><option value="11">11월</option><option value="12">12월</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase">업체명</label>
                    <select id="selCompany" onchange="updateProjectList()" class="w-full h-12 px-3 bg-white border-2 border-slate-200 rounded-xl font-bold"></select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase">프로젝트</label>
                    <select id="selProject" onchange="runAnalysis()" class="w-full h-12 px-3 bg-white border-2 border-amber-500 rounded-xl font-black text-slate-900"></select>
                </div>
            </div>
        </section>

        <div id="analysisView" class="hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="dashboard-card p-4 border-l-8 border-l-slate-800 flex justify-between items-center">
                    <span class="text-sm font-bold text-slate-400">총 중량(kg)</span>
                    <input type="text" id="inputWeight" onblur="handleCalc('inputWeight')" class="w-1/2 text-right text-3xl font-black outline-none bg-transparent" placeholder="0">
                </div>
                <div class="dashboard-card p-4 border-l-8 border-l-blue-600 flex justify-between items-center">
                    <span class="text-sm font-bold text-blue-400">목표 원가(₩)</span>
                    <input type="text" id="inputBudget" onblur="handleCalc('inputBudget')" class="w-1/2 text-right text-3xl font-black text-blue-600 outline-none bg-transparent" placeholder="0">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="dashboard-card p-5 border-t-4 border-t-purple-500 text-center">
                    <p class="text-[10px] font-black text-slate-400">작업 기간</p>
                    <div id="viewPeriod" class="text-lg font-black mt-2">-</div>
                </div>
                <div class="dashboard-card p-5 border-t-4 border-t-amber-500 text-center">
                    <p class="text-[10px] font-black text-slate-400">총 투입 시간</p>
                    <div class="text-4xl font-black mt-1"><span id="viewTotalHours">0</span>h</div>
                </div>
                <div class="dashboard-card p-5 border-t-4 border-t-emerald-500 text-center">
                    <p class="text-[10px] font-black text-slate-400">현재 총 투입 비용</p>
                    <div class="text-3xl font-black text-emerald-600 mt-1">₩<span id="viewTotalCost">0</span></div>
                </div>
            </div>

            <div class="dashboard-card overflow-x-auto p-4" id="matrixContainer"></div>
        </div>

        <div id="emptyState" class="py-20 text-center dashboard-card border-dashed border-4 text-slate-300 font-black italic">
            데이터를 불러오는 중입니다...
        </div>
    </main>

    <script>
        let rawData = [];
        let displayUnit = 'h';

        // 데이터 자동 로드 함수
        function loadData() {
            Papa.parse('data.csv', {
                download: true,
                header: true,
                encoding: "EUC-KR",
                skipEmptyLines: true,
                complete: function(results) {
                    if (results.data && results.data.length > 0) {
                        rawData = results.data.map(item => ({
                            date: item['날짜'] || item['date'],
                            type: item['공정'] || item['type'] || '기타',
                            client: item['업체명'] || item['client'],
                            project: item['프로젝트'] || item['project'],
                            h_reg: parseFloat(item['정시'] || item['h_reg']) || 0,
                            h_over: parseFloat(item['연장'] || item['h_over']) || 0,
                            cost: parseInt((item['발생비용'] || item['cost'] || '0').toString().replace(/[^0-9]/g, "")) || 0,
                            worker: item['작업자'] || item['worker'],
                            year: new Date(item['날짜'] || item['date']).getFullYear().toString(),
                            month: (new Date(item['날짜'] || item['date']).getMonth() + 1).toString()
                        })).filter(i => i.date);
                        
                        populateFilters();
                        document.getElementById('emptyState').textContent = "프로젝트를 선택하세요";
                    } else {
                        document.getElementById('emptyState').textContent = "data.csv 파일에 데이터가 없습니다.";
                    }
                },
                error: function() {
                    document.getElementById('emptyState').textContent = "data.csv 파일을 찾을 수 없습니다.";
                }
            });
        }

        function populateFilters() {
            const yearSel = document.getElementById('selYear');
            const years = [...new Set(rawData.map(i => i.year))].sort((a,b) => b-a);
            yearSel.innerHTML = '<option value="">전체 연도</option>';
            years.forEach(y => yearSel.add(new Option(y + '년', y)));
            updateProjectList();
        }

        function updateProjectList() {
            const year = document.getElementById('selYear').value;
            const month = document.getElementById('selMonth').value;
            const compSel = document.getElementById('selCompany');
            const projSel = document.getElementById('selProject');

            let filtered = rawData;
            if (year) filtered = filtered.filter(i => i.year === year);
            if (month) filtered = filtered.filter(i => i.month === month);

            const companies = [...new Set(filtered.map(i => i.client))].sort();
            compSel.innerHTML = '<option value="">업체 선택(전체)</option>';
            companies.forEach(c => compSel.add(new Option(c, c)));

            const projects = [...new Set(filtered.map(i => i.project))].sort();
            projSel.innerHTML = '<option value="">프로젝트 선택</option>';
            projects.forEach(p => projSel.add(new Option(p, p)));
        }

        function handleCalc(id) {
            const input = document.getElementById(id);
            let val = input.value.trim().replace(/,/g, '');
            if (!val) return;
            try {
                const result = new Function(`return (${val.replace(/[^0-9+\-*/().]/g, '')})`)();
                input.value = Math.floor(result).toLocaleString();
            } catch (e) {}
            runAnalysis();
        }

        function runAnalysis() {
            const project = document.getElementById('selProject').value;
            if (!project) return;

            const data = rawData.filter(i => i.project === project).sort((a,b) => new Date(a.date) - new Date(b.date));
            let totalH = 0, totalC = 0;
            data.forEach(i => { totalH += (i.h_reg + i.h_over); totalC += i.cost; });

            document.getElementById('viewTotalHours').textContent = totalH.toLocaleString();
            document.getElementById('viewTotalCost').textContent = totalC.toLocaleString();
            document.getElementById('viewPeriod').textContent = `${data[0].date} ~ ${data[data.length-1].date}`;

            // 매트릭스 생성
            const processes = [...new Set(data.map(i => i.type))].sort();
            const workers = [...new Set(data.map(i => i.worker))].sort();
            const weight = parseFloat(document.getElementById('inputWeight').value.replace(/,/g, '')) || 0;

            let html = `<table class="matrix-table w-full"><thead><tr><th>공정</th>`;
            workers.forEach(w => html += `<th>${w}</th>`);
            html += `<th>합계</th>${weight > 0 ? '<th>단가</th>' : ''}</tr></thead><tbody>`;

            processes.forEach(p => {
                let rowSumH = 0, rowSumC = 0;
                html += `<tr><td class="font-black bg-slate-50">${p}</td>`;
                workers.forEach(w => {
                    const h = data.filter(i => i.type === p && i.worker === w).reduce((a, b) => a + (b.h_reg + b.h_over), 0);
                    const c = data.filter(i => i.type === p && i.worker === w).reduce((a, b) => a + b.cost, 0);
                    rowSumH += h; rowSumC += c;
                    html += `<td class="${h > 0 ? 'cell-highlight font-bold' : ''}">${h > 0 ? h + 'h' : ''}</td>`;
                });
                html += `<td class="bg-slate-100 font-black">${rowSumH}h</td>`;
                if(weight > 0) html += `<td class="text-blue-600">₩${Math.floor(rowSumC/weight).toLocaleString()}</td>`;
                html += '</tr>';
            });
            html += '</tbody></table>';
            
            document.getElementById('matrixContainer').innerHTML = html;
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('analysisView').classList.remove('hidden');
        }

        window.onload = loadData;
    </script>
</body>
</html>
