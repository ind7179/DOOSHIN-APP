<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>두신이엔지 공수분석</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background-color: #f4f4f4; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #1e293b; color: white; }
        .logo { display: block; margin: 0 auto 10px; width: 100px; }
    </style>
</head>
<body>
    <h2 style="text-align:center;">현장 공수 현황</h2>
    <div id="table-container">데이터를 확인 중입니다...</div>

    <script>
        // 가장 단순하게 'data.csv' 파일만 가져오도록 고쳤습니다.
        Papa.parse('data.csv', {
            download: true,
            header: true,
            complete: function(results) {
                let data = results.data;
                let html = '<table><thead><tr>';
                // 제목 만들기
                Object.keys(data[0]).forEach(key => { html += `<th>${key}</th>`; });
                html += '</tr></thead><tbody>';
                // 내용 넣기
                data.forEach(row => {
                    if(row[Object.keys(row)[0]]) {
                        html += '<tr>';
                        Object.values(row).forEach(val => { html += `<td>${val}</td>`; });
                        html += '</tr>';
                    }
                });
                html += '</tbody></table>';
                document.getElementById('table-container').innerHTML = html;
            },
            error: function() {
                document.getElementById('table-container').innerHTML = "data.csv 파일을 찾을 수 없습니다. 깃허브에 파일이 있는지 확인해주세요!";
            }
        });
    </script>
</body>
</html>
