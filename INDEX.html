<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로젝트 정밀 분석 시스템 V3.9.8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #334155; }
        .dashboard-card { background: white; border-radius: 1.25rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; overflow: hidden; }
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .matrix-table th, .matrix-table td { border: 1px solid #e2e8f0; min-width:90px; text-align: center; }
        .matrix-table th { 
            background-color: #f8fafc; 
            font-weight: 900; 
            color: #1e293b; 
            padding: 16px 8px; 
            font-size: 15px; 
            position: sticky; 
            top: 0; 
            z-index: 10; 
        }
        .matrix-table td { padding: 12px 8px; vertical-align: middle; font-size: 14px; }
        .cell-highlight { background-color: #fffbeb; }
        
        .avg-label-box { background-color: #fff7ed; border: 1px solid #ffedd5; border-radius: 0.5rem; padding: 4px 6px; margin-top: 6px; }
        .avg-value-text { font-size: 13px; color: #ea580c; font-weight: 800; }

        .history-table th { background-color: #f1f5f9; color: #475569; font-size: 12px; padding: 12px; text-align: left; border-bottom: 2px solid #e2e8f0; }
        .history-table td { padding: 12px; font-size: 13px; border-bottom: 1px solid #f1f5f9; }

        select { 
            appearance: none; 
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.75rem center;
            background-size: 1rem;
        }

        @keyframes highlight {
            0% { transform: translateY(-5px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .avg-badge { animation: highlight 0.4s ease-out; }
    </style>
</head>
<body class="pb-20">

    <nav class="bg-slate-900 text-white py-4 px-6 sticky top-0 z-50 shadow-2xl">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-amber-500 p-2 rounded-xl text-slate-900 font-black">PRO-V3.9.8</div>
                <h1 class="text-xl font-black tracking-tight">생산 공정 및 인력 투입 분석기</h1>
            </div>
            <div id="avgHintContainer" class="hidden flex items-center bg-amber-500/10 border border-amber-500/30 px-4 py-2 rounded-xl avg-badge">
                <span class="text-amber-500 text-sm font-black italic" id="avgHintText"></span>
            </div>
            <div class="flex items-center gap-4 ml-auto">
                <input type="file" id="csvFile" accept=".csv" class="hidden">
                <button onclick="document.getElementById('csvFile').click()" class="bg-amber-600 hover:bg-amber-500 text-white px-5 py-2.5 rounded-xl text-sm font-bold transition-all flex items-center gap-2 shadow-lg">
                    📁 엑셀(CSV) 업로드
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 mt-8 space-y-6">

        <section class="dashboard-card p-6 border-t-4 border-t-amber-500 bg-slate-50">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase italic">연도</label>
                    <select id="selYear" onchange="updateProjectList()" class="w-full h-12 px-3 bg-white border-2 border-slate-200 rounded-xl text-lg font-black outline-none focus:ring-4 focus:ring-amber-500/20 shadow-sm">
                        <option value="">전체 연도</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase italic">월</label>
                    <select id="selMonth" onchange="updateProjectList()" class="w-full h-12 px-3 bg-white border-2 border-slate-200 rounded-xl text-lg font-black outline-none focus:ring-4 focus:ring-amber-500/20 shadow-sm">
                        <option value="">전체 월</option>
                        <option value="1">1월</option><option value="2">2월</option><option value="3">3월</option><option value="4">4월</option>
                        <option value="5">5월</option><option value="6">6월</option><option value="7">7월</option><option value="8">8월</option>
                        <option value="9">9월</option><option value="10">10월</option><option value="11">11월</option><option value="12">12월</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase italic">업체명</label>
                    <select id="selCompany" onchange="updateProjectList()" class="w-full h-12 px-3 bg-white border-2 border-slate-200 rounded-xl text-md font-bold outline-none focus:ring-4 focus:ring-amber-500/20 shadow-sm">
                        <option value="">업체 선택 (전체)</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase italic">프로젝트</label>
                    <select id="selProject" onchange="runAnalysis()" class="w-full h-12 px-3 bg-white border-2 border-amber-500 rounded-xl text-md font-black text-slate-900 outline-none shadow-md ring-2 ring-amber-500/10">
                        <option value="">선택 대기</option>
                    </select>
                </div>
            </div>
        </section>

        <div id="analysisView" class="hidden space-y-6 animate-in fade-in duration-700">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- 총 중량 카드: 사칙연산 기능 추가 -->
                <div class="dashboard-card p-4 border-l-8 border-l-slate-800 flex items-center justify-between">
                    <div>
                        <p class="text-[10px] font-black text-slate-400 uppercase italic">Total Weight</p>
                        <p class="text-[10px] text-slate-400 font-bold mb-1">총 중량 (kg)</p>
                    </div>
                    <input type="text" id="inputWeight" onblur="handleCalc('inputWeight')" onkeydown="if(event.key==='Enter') handleCalc('inputWeight')" placeholder="중량 입력 (사칙연산 가능)" class="w-1/2 text-right text-3xl font-black text-slate-800 outline-none bg-transparent border-b-2 border-slate-100 focus:border-amber-500">
                </div>
                <!-- 목표 원가 카드: 사칙연산 기능 유지 및 콤마 처리 -->
                <div class="dashboard-card p-4 border-l-8 border-l-blue-600 flex items-center justify-between">
                    <div>
                        <p class="text-[10px] font-black text-blue-500 uppercase italic">Target Budget</p>
                        <p class="text-[10px] text-blue-400 font-bold mb-1">목표 원가 (₩)</p>
                    </div>
                    <input type="text" id="inputBudget" onblur="handleCalc('inputBudget')" onkeydown="if(event.key==='Enter') handleCalc('inputBudget')" placeholder="예산 입력 (사칙연산 가능)" class="w-1/2 text-right text-3xl font-black text-blue-600 outline-none bg-transparent border-b-2 border-blue-50 focus:border-blue-500">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 pt-2">
                <div class="dashboard-card p-5 border-t-4 border-t-purple-500">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">작업 기간</p>
                    <div id="viewPeriod" class="text-xl font-black text-slate-900 mt-2">0000.00.00 ~ 0000.00.00</div>
                    <div id="viewWorkDays" class="text-sm font-bold text-purple-600 mt-0.5">실제 작업: 0일</div>
                </div>
                <div class="dashboard-card p-5 border-t-4 border-t-amber-500">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">총 투입 시간</p>
                    <div class="flex flex-col mt-2">
                        <div class="flex items-baseline gap-2">
                            <span id="viewTotalHours" class="text-5xl font-black text-slate-900">0</span>
                            <span class="text-sm font-bold text-slate-400 uppercase tracking-tighter">시간</span>
                        </div>
                        <div class="mt-1 pl-1">
                            <span class="text-xs font-bold text-slate-400 italic mr-1">공수:</span>
                            <span id="viewTotalMD" class="text-lg font-black text-amber-600">0.0</span>
                            <span class="text-[10px] font-bold text-amber-500/70 ml-0.5">MD</span>
                        </div>
                    </div>
                </div>
                <div class="dashboard-card p-5 border-t-4 border-t-emerald-500 flex flex-col justify-between">
                    <div>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">현재 총 투입 비용</p>
                        <div class="flex items-baseline gap-1 mt-1">
                            <span class="text-xl font-bold text-emerald-600">₩</span>
                            <span id="viewTotalCost" class="text-4xl font-black text-emerald-600">0</span>
                        </div>
                    </div>
                    <div class="mt-2 pt-2 border-t border-slate-100">
                        <p class="text-[10px] font-black text-slate-400 uppercase italic">예산 대비 손실/이익</p>
                        <div id="viewProfitLoss" class="text-3xl font-black">₩ 0</div>
                    </div>
                </div>
            </div>

            <div class="dashboard-card flex flex-col min-h-[400px]">
                <div class="p-6 border-b border-slate-50 bg-slate-50/50 flex justify-between items-center">
                    <h4 class="text-lg font-black text-slate-800 italic uppercase tracking-widest">공정별 작업 분석 매트릭스</h4>
                    <div class="flex bg-slate-200 p-1 rounded-xl">
                        <button onclick="toggleUnit('h')" id="btnUnitH" class="px-6 py-2.5 text-xs font-black rounded-lg bg-white shadow-sm transition-all">시간(h)</button>
                        <button onclick="toggleUnit('md')" id="btnUnitMD" class="px-6 py-2.5 text-xs font-black rounded-lg text-slate-500 transition-all ml-1">공수(MD)</button>
                    </div>
                </div>
                <div class="flex-1 overflow-auto custom-scroll p-4" id="matrixContainer"></div>
            </div>

            <div class="dashboard-card flex flex-col">
                <div class="p-6 border-b border-slate-50 bg-slate-50/50">
                    <h4 class="text-lg font-black text-slate-800 italic uppercase tracking-widest">프로젝트 상세 작업 이력</h4>
                </div>
                <div class="overflow-auto custom-scroll max-h-[500px]">
                    <table class="history-table w-full border-collapse">
                        <thead>
                            <tr>
                                <th>날짜</th>
                                <th>작업자</th>
                                <th>공정</th>
                                <th>정시</th>
                                <th>연장</th>
                                <th>총 시간</th>
                                <th>발생 비용</th>
                            </tr>
                        </thead>
                        <tbody id="historyBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="emptyState" class="py-40 text-center dashboard-card border-dashed border-4 bg-transparent text-slate-300 font-black italic uppercase">
            데이터를 업로드하고 분석할 프로젝트를 선택하세요
        </div>

    </main>

    <script>
        let rawData = [];
        let currentProjectData = [];
        let displayUnit = 'h';
        let currentAvgH = 0; 
        let processAverages = {}; 

        // 사칙연산 및 천 단위 콤마 처리 공통 함수
        function handleCalc(id) {
            const input = document.getElementById(id);
            let val = input.value.trim().replace(/,/g, ''); // 기존 콤마 제거 후 계산
            if (!val) {
                runAnalysis();
                return;
            }
            try {
                // 숫자와 사칙연산 기호만 추출
                const sanitized = val.replace(/[^0-9+\-*/().]/g, '');
                if (sanitized) {
                    const result = new Function(`return (${sanitized})`)();
                    if (!isNaN(result) && isFinite(result)) {
                        const finalVal = Math.floor(result);
                        input.value = finalVal.toLocaleString(); // 결과에 콤마 적용
                    }
                }
            } catch (e) { 
                console.warn("Invalid expression"); 
            }
            runAnalysis();
        }

        function normalizeProjName(name) {
            if (!name) return "";
            return name.replace(/HKJ/g, "").replace(/[\s\-_]/g, "").toUpperCase();
        }

        function extractCoreKey(name, clientName = "") {
            const normalized = normalizeProjName(name);
            const isDaehan = (clientName === "대한중전기" || normalized.includes("대한중전기"));

            if (isDaehan) {
                if (normalized.includes("COLUMN") || normalized.includes("직관")) return "DAEHAN_JIK_GROUP"; 
                if (normalized.includes("DISCHARGE") || normalized.includes("곡관")) return "DAEHAN_GOK_GROUP";
                if (/[ØKWP]/.test(normalized)) return "DAEHAN_TECHNICAL_GROUP";
                return "DAEHAN_OTHER";
            }
            const match = normalized.match(/[A-Z]+[0-9]+/);
            return match ? match[0] : normalized.substring(0, 5);
        }

        function initData(data) {
            rawData = data.map(item => {
                const d = new Date(item.date);
                return {
                    ...item,
                    year: isNaN(d.getFullYear()) ? 'Unknown' : d.getFullYear().toString(),
                    month: isNaN(d.getMonth()) ? 'Unknown' : (d.getMonth() + 1).toString(),
                    dateObj: d,
                    normName: normalizeProjName(item.project),
                    coreKey: extractCoreKey(item.project, item.client)
                };
            });
            populateFilters();
        }

        function populateFilters() {
            const yearSel = document.getElementById('selYear');
            const years = [...new Set(rawData.map(i => i.year))].filter(y => y !== 'Unknown').sort((a,b) => b-a);
            yearSel.innerHTML = '<option value="">전체 연도</option>';
            years.forEach(y => yearSel.add(new Option(y + '년', y)));
            updateProjectList();
        }

        function updateProjectList() {
            const year = document.getElementById('selYear').value;
            const month = document.getElementById('selMonth').value;
            const compSel = document.getElementById('selCompany');
            const projSel = document.getElementById('selProject');

            let filtered = rawData;
            if (year) filtered = filtered.filter(i => i.year === year);
            if (month) filtered = filtered.filter(i => i.month === month);

            const companies = [...new Set(filtered.map(i => i.client))].sort();
            const currentCompValue = compSel.value;
            compSel.innerHTML = '<option value="">업체 선택 (전체)</option>';
            companies.forEach(c => compSel.add(new Option(c, c)));
            if (companies.includes(currentCompValue)) compSel.value = currentCompValue;

            const company = compSel.value;
            let pFiltered = filtered;
            if (company) pFiltered = pFiltered.filter(i => i.client === company);

            const projectPairs = [...new Set(pFiltered.map(i => `${i.client}|${i.project}`))].sort();
            projSel.innerHTML = `<option value="">프로젝트 선택 (${projectPairs.length})</option>`;
            
            projectPairs.forEach(pair => {
                const [cName, pName] = pair.split('|');
                const optText = company ? pName : `[${cName}] ${pName}`;
                const option = new Option(optText, pName);
                option.dataset.client = cName;
                projSel.add(option);
            });
        }

        function runAnalysis() {
            const projSel = document.getElementById('selProject');
            const selectedOption = projSel.options[projSel.selectedIndex];
            const project = projSel.value;
            const company = selectedOption ? selectedOption.dataset.client : "";
            if (company) document.getElementById('selCompany').value = company;

            const hintContainer = document.getElementById('avgHintContainer');
            const hintText = document.getElementById('avgHintText');
            
            // 콤마 제거 후 숫자 변환
            const budgetInput = parseFloat(document.getElementById('inputBudget').value.replace(/,/g, '')) || 0;
            const weightInput = parseFloat(document.getElementById('inputWeight').value.replace(/,/g, '')) || 0;

            if (!project) {
                document.getElementById('analysisView').classList.add('hidden');
                document.getElementById('emptyState').classList.remove('hidden');
                hintContainer.classList.add('hidden');
                return;
            }

            const selectedCoreKey = extractCoreKey(project, company);
            const relatedProjsLogs = rawData.filter(i => i.coreKey === selectedCoreKey);
            const uniqueRelatedNames = [...new Set(relatedProjsLogs.map(i => i.project))];

            if (uniqueRelatedNames.length > 1) {
                let totalHAll = 0;
                relatedProjsLogs.forEach(i => totalHAll += (i.h_reg + i.h_over));
                currentAvgH = (totalHAll / uniqueRelatedNames.length);
                hintContainer.classList.remove('hidden');
                
                let groupLabel = selectedCoreKey;
                if(selectedCoreKey === "DAEHAN_GOK_GROUP") groupLabel = "대한중전기 곡관 계열";
                else if(selectedCoreKey === "DAEHAN_JIK_GROUP") groupLabel = "대한중전기 직관 계열";
                else if(selectedCoreKey === "DAEHAN_TECHNICAL_GROUP") groupLabel = "대한중전기 주요 부품 계열";
                
                hintText.textContent = `💡 ${groupLabel} 평균: ${parseInt(currentAvgH).toLocaleString()}시간 (${uniqueRelatedNames.length}개 모델 통합)`;
                
                processAverages = {};
                const procList = [...new Set(relatedProjsLogs.map(i => i.type))];
                procList.forEach(p => {
                    const procH = relatedProjsLogs.filter(i => i.type === p).reduce((acc, curr) => acc + (curr.h_reg + curr.h_over), 0);
                    processAverages[p] = procH / uniqueRelatedNames.length;
                });
            } else {
                hintContainer.classList.add('hidden');
                let selfTotal = 0;
                rawData.filter(i => i.project === project).forEach(i => selfTotal += (i.h_reg + i.h_over));
                currentAvgH = selfTotal;
                processAverages = {};
            }

            currentProjectData = rawData.filter(i => i.client === company && i.project === project).sort((a,b) => a.dateObj - b.dateObj);

            if (currentProjectData.length > 0) {
                const start = currentProjectData[0].date.replace(/-/g, '.');
                const end = currentProjectData[currentProjectData.length - 1].date.replace(/-/g, '.');
                const uniqueDates = [...new Set(currentProjectData.map(i => i.date))];
                
                document.getElementById('viewPeriod').textContent = `${start} ~ ${end}`;
                document.getElementById('viewWorkDays').textContent = `실제 작업: ${uniqueDates.length}일`;
                
                let totalH = 0, totalC = 0;
                currentProjectData.forEach(i => { totalH += (i.h_reg + i.h_over); totalC += i.cost; });
                
                document.getElementById('viewTotalHours').textContent = totalH.toLocaleString();
                document.getElementById('viewTotalMD').textContent = (totalH / 8).toFixed(1);
                document.getElementById('viewTotalCost').textContent = totalC.toLocaleString();

                const profitLossElem = document.getElementById('viewProfitLoss');
                if (budgetInput > 0) {
                    const diff = budgetInput - totalC;
                    profitLossElem.textContent = `₩ ${diff.toLocaleString()}`;
                    profitLossElem.className = `text-3xl font-black ${diff >= 0 ? 'text-emerald-500' : 'text-red-500'}`;
                } else {
                    profitLossElem.textContent = '예산 미입력';
                    profitLossElem.className = 'text-xl font-black text-slate-300';
                }

                renderMatrix(weightInput);
                renderHistory();
                document.getElementById('emptyState').classList.add('hidden');
                document.getElementById('analysisView').classList.remove('hidden');
            }
        }

        function renderMatrix(weight) {
            const container = document.getElementById('matrixContainer');
            const processes = [...new Set(currentProjectData.map(i => i.type))].sort();
            const workers = [...new Set(currentProjectData.map(i => i.worker))].sort();

            const dataMap = {}; 
            processes.forEach(p => { 
                dataMap[p] = {}; 
                workers.forEach(w => dataMap[p][w] = { h: 0, c: 0 }); 
            });
            
            let grandTotalH = 0;
            let grandTotalC = 0;
            currentProjectData.forEach(i => {
                const h = (i.h_reg + i.h_over);
                dataMap[i.type][i.worker].h += h;
                dataMap[i.type][i.worker].c += i.cost;
                grandTotalH += h;
                grandTotalC += i.cost;
            });

            let html = `<table class="matrix-table w-full"><thead><tr><th class="sticky left-0 bg-slate-100 z-20 shadow text-slate-500 font-bold text-xs uppercase tracking-tighter">공정 \ 작업자</th>`;
            workers.forEach(w => html += `<th class="text-slate-900 font-black">${w}</th>`);
            html += `<th class="bg-slate-200 shadow text-slate-700" style="min-width: 140px;">공정별 합계</th>`;
            if (weight > 0) html += `<th class="bg-blue-100 text-blue-800 font-black">단위 중량 (₩/kg)</th>`;
            html += `</tr></thead><tbody>`;

            processes.forEach(p => {
                let rowSumH = 0; let rowSumC = 0;
                workers.forEach(w => { rowSumH += dataMap[p][w].h; rowSumC += dataMap[p][w].c; });
                const procAvgH = processAverages[p] || 0;
                const displayProcAvg = displayUnit === 'h' ? procAvgH.toFixed(1) : (procAvgH / 8).toFixed(1);
                
                html += `<tr><td class="sticky left-0 bg-slate-50 font-black text-slate-700 shadow p-3">
                    <div class="text-[15px] leading-tight font-black">${p}</div>
                    <div class="avg-label-box">
                        <div class="text-[10px] text-slate-400 font-bold leading-none mb-1">계열 평균</div>
                        <div class="avg-value-text">${displayProcAvg}${displayUnit==='h'?'h':'d'}</div>
                    </div>
                </td>`;
                
                workers.forEach(w => {
                    const hVal = dataMap[p][w].h;
                    const cVal = dataMap[p][w].c;
                    const displayH = displayUnit === 'h' ? hVal : (hVal / 8).toFixed(1);
                    html += `<td class="${hVal > 0 ? 'cell-highlight' : ''}">
                        <div class="font-black text-slate-800 text-x1">${hVal > 0 ? displayH + (displayUnit==='h'?'h':'') : ''}</div>
                        <div class="text-[11px] text-slate-400 mt-1">${cVal > 0 ? '₩' + cVal.toLocaleString() : ''}</div>
                    </td>`;
                });
                
                const sumH = rowSumH.toLocaleString();
                const sumMD = (rowSumH / 8).toFixed(1);
                const procRatioOfTotal = grandTotalH > 0 ? ((rowSumH / grandTotalH) * 100).toFixed(1) : 0;
                const procPerfRatio = procAvgH > 0 ? ((rowSumH / procAvgH) * 100) : 100;
                const procPerfColor = procPerfRatio > 100 ? 'text-red-600' : (procPerfRatio < 100 ? 'text-blue-600' : 'text-slate-500');
                const procSign = procPerfRatio > 100 ? '+' : '';
                const procDiff = (procPerfRatio - 100).toFixed(1);
                
                html += `<td class="bg-slate-100 font-bold p-3 text-left border-l-2 border-slate-200">${rowSumH > 0 ? `
                    <div class="text-slate-900 text-[13px] font-black underline decoration-slate-300 underline-offset-4 mb-1">${p} 합계</div>
                    <div class="text-[15px] font-black text-slate-900">${sumH}h <span class="text-indigo-600 text-[12px]">(${sumMD}MD)</span></div>
                    <div class="flex flex-wrap gap-x-2 gap-y-1 mt-1.5">
                        <span class="text-[11px] bg-white border border-slate-200 px-1.5 rounded font-bold text-indigo-500">비율: ${procRatioOfTotal}%</span>
                        <span class="text-[11px] bg-white border border-slate-200 px-1.5 rounded font-black ${procPerfColor}">대비: ${procSign}${procDiff}%</span>
                    </div>
                    <div class="text-[11px] text-slate-400 font-medium italic mt-1.5">총액: ₩${rowSumC.toLocaleString()}</div>
                    ` : ''}</td>`;
                if (weight > 0) {
                    const cpw = rowSumC > 0 ? (rowSumC / weight).toFixed(1) : "";
                    html += `<td class="bg-blue-50/50 font-black text-blue-800 text-xl">${cpw !== "" ? '₩' + parseFloat(cpw).toLocaleString() : ''}</td>`;
                }
                html += `</tr>`;
            });
            
            const finalAvgDisplay = (displayUnit === 'h' ? currentAvgH : currentAvgH / 8).toFixed(1);
            html += `<tr class="border-t-4 border-slate-300"><td class="sticky left-0 bg-slate-900 text-white font-black p-4 z-20">
                <div class="text-[11px] opacity-70 font-bold uppercase tracking-wider">계열 총 평균</div>
                <div class="text-2xl text-amber-400 mt-1 font-black">${finalAvgDisplay}${displayUnit==='h'?'h':'d'}</div>
            </td>`;
            
            workers.forEach(w => {
                let colSumH = 0; let colSumC = 0;
                processes.forEach(p => { colSumH += dataMap[p][w].h; colSumC += dataMap[p][w].c; });
                const colDisplayH = displayUnit === 'h' ? colSumH : (colSumH / 8).toFixed(1);
                const colRatio = grandTotalC > 0 ? ((colSumC / grandTotalC) * 100).toFixed(1) : 0;
                html += `<td class="bg-slate-50 font-bold p-3">
                    <div class="text-slate-900 text-base font-black">${colSumH > 0 ? colDisplayH + (displayUnit==='h'?'h':'') : ''}</div>
                    <div class="text-[13px] text-emerald-600 font-black mt-2">${colSumC > 0 ? '₩' + colSumC.toLocaleString() : ''}</div>
                    <div class="text-[11px] text-slate-400 italic font-medium mt-0.5">${colSumC > 0 ? '전체비중:' + colRatio + '%' : ''}</div>
                </td>`;
            });

            const finalDisplayH = grandTotalH.toLocaleString();
            const finalDisplayMD = (grandTotalH / 8).toFixed(1);
            const totalPerfRatio = currentAvgH > 0 ? ((grandTotalH / currentAvgH) * 100) : 100;
            const totalPerfColor = totalPerfRatio > 100 ? 'text-white bg-red-600' : (totalPerfRatio < 100 ? 'text-white bg-blue-600' : 'text-white bg-amber-500');
            
            html += `<td class="${totalPerfColor} font-black p-4">
                <div class="text-[15px] leading-tight font-black">전체 ${finalDisplayH}h</div>
                <div class="text-[12px] opacity-90 mt-0.5 font-bold">(${finalDisplayMD}MD)</div>
                <div class="text-[12px] mt-2 border-t border-white/30 pt-1.5 font-black">평균대비: ${(totalPerfRatio - 100).toFixed(1)}%</div>
                <div class="text-[13px] font-black mt-1">₩${grandTotalC.toLocaleString()}</div>
            </td>`;
            if (weight > 0) {
                const totalCpw = (grandTotalC / weight).toLocaleString(undefined, {minimumFractionDigits:1, maximumFractionDigits:1});
                html += `<td class="bg-blue-700 text-white font-black text-2xl italic border-l border-white/20">₩${totalCpw}</td>`;
            }
            html += `</tr></tbody></table>`;
            container.innerHTML = html;
        }

        function renderHistory() {
            const body = document.getElementById('historyBody');
            let html = '';
            currentProjectData.forEach(row => {
                const totalH = row.h_reg + row.h_over;
                html += `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="text-slate-500 font-medium">${row.date}</td>
                    <td class="font-bold text-slate-700">${row.worker}</td>
                    <td><span class="px-2 py-0.5 bg-slate-100 rounded text-[11px] font-bold text-slate-600">${row.type}</span></td>
                    <td class="text-slate-600 font-medium">${row.h_reg > 0 ? row.h_reg + 'h' : ''}</td>
                    <td class="text-amber-600 font-black">${row.h_over > 0 ? row.h_over + 'h' : ''}</td>
                    <td class="font-black text-slate-800">${totalH}h</td>
                    <td class="text-emerald-600 font-bold">₩${row.cost.toLocaleString()}</td>
                </tr>`;
            });
            body.innerHTML = html;
        }

        function toggleUnit(unit) {
            displayUnit = unit;
            document.getElementById('btnUnitH').className = unit === 'h' ? 'px-6 py-2.5 text-xs font-black rounded-lg bg-white shadow-sm transition-all' : 'px-6 py-2.5 text-xs font-black rounded-lg text-slate-500 transition-all';
            document.getElementById('btnUnitMD').className = unit === 'md' ? 'px-6 py-2.5 text-xs font-black rounded-lg bg-white shadow-sm transition-all ml-1' : 'px-6 py-2.5 text-xs font-black rounded-lg text-slate-500 transition-all ml-1';
            if (currentProjectData.length > 0) runAnalysis();
        }

        document.getElementById('csvFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                const rows = evt.target.result.split(/\r?\n/).slice(1);
                const parsed = rows.map(r => {
                    const c = r.split(',');
                    if (c.length < 7) return null;
                    return {
                        date: c[0].trim(), type: c[1]?.trim() || '기타', client: c[2]?.trim(), project: c[3]?.trim(),
                        h_reg: parseFloat(c[4]) || 0, h_over: parseFloat(c[5]) || 0,
                        cost: parseInt(c[6]?.replace(/[^0-9]/g, "")) || 0, worker: c[7]?.trim()
                    };
                }).filter(i => i !== null);
                initData(parsed);
                alert('V3.9.8 데이터 로딩 완료 (중량 사칙연산 및 자리수 구분 추가)');
            };
            reader.readAsText(file, "EUC-KR");
        });
    </script>
</body>
</html>
